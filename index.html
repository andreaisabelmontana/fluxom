<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Fluid Simulation — 2D SPH</title>
  <meta name="description" content="A real-time 2D smoothed-particle hydrodynamics (SPH) fluid simulation you can stir with your cursor." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💧</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="stage"></canvas>

  <header class="hud">
    <h1>Fluid Simulation</h1>
    <p class="tag">Particles that behave like water.</p>
  </header>

  <aside class="panel" id="panel">
    <button class="collapse" id="collapse" title="Hide panel">‹</button>

    <section>
      <label>Particles <span data-out="count">900</span></label>
      <input type="range" id="count" min="200" max="2000" step="100" value="900" />
    </section>

    <section>
      <h2>Fluid</h2>
      <label>Gravity <span data-out="gravity">1.00</span></label>
      <input type="range" id="gravity" min="0" max="2.5" step="0.05" value="1" />
      <label>Viscosity <span data-out="visc">1.00</span></label>
      <input type="range" id="visc" min="0.2" max="3" step="0.05" value="1" />
      <label>Stiffness <span data-out="stiff">2000</span></label>
      <input type="range" id="stiff" min="500" max="4000" step="100" value="2000" />
    </section>

    <section>
      <label for="mode">Cursor</label>
      <select id="mode">
        <option value="push">Push away</option>
        <option value="pull">Pull in</option>
        <option value="add">Add fluid</option>
      </select>
    </section>

    <div class="btns"><button id="reset">Reset (dam break)</button></div>
    <p class="hint">Drag on the water to stir it. The fluid sloshes, splashes, and settles under real pressure forces.</p>
  </aside>

  <script type="module" src="src/main.js"></script>
</body>
</html>
